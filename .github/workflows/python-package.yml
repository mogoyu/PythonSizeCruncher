name: Build and Release with Nuitka (Dynamic Matrix)

# =============================================================================
# 动态平台控制版本 - 终极重构版 (修正版)
# 原理：通过 JSON 配置集中管理所有平台，动态生成 Matrix 执行
# 特点：单点配置、自动并行、零代码重复
# =============================================================================

env:
  DEFAULT_PYTHON_VERSIONS: '["3.11"]'

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      platform:
        description: '手动选择构建平台'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - win64
          - win32
          - linux
          - linux-old
          - macos

jobs:
  # =========================================================================
  # 准备阶段 - 读取配置并生成动态 Matrix
  # =========================================================================
  prepare:
    runs-on: ubuntu-latest
    outputs:
      main_script: ${{ steps.detect.outputs.main_script }}
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.version.outputs.should_release }}
      python_matrix: ${{ steps.matrix.outputs.python_versions }}
      build_matrix: ${{ steps.build_config.outputs.matrix }}
      build_summary: ${{ steps.build_config.outputs.summary }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Detect main script file
        id: detect
        shell: bash
        run: |
          if [ -n "${{ vars.MAIN_SCRIPT }}" ]; then
            MAIN_SCRIPT="${{ vars.MAIN_SCRIPT }}"
            echo "✅ 使用仓库变量 MAIN_SCRIPT: $MAIN_SCRIPT"
          else
            echo "ℹ️ 尝试自动检测常见入口文件..."
            candidates=("main.py" "app.py" "run.py" "start.py" "cli.py" "program.py" "__main__.py")
            found=""
            for name in "${candidates[@]}"; do
              if [ -f "$name" ]; then
                found="$name"
                echo "✅ 找到入口文件: $name"
                break
              fi
            done
            if [ -z "$found" ]; then
              echo "❌ 错误：未找到任何常见入口文件"
              exit 1
            fi
            MAIN_SCRIPT="$found"
          fi
          
          if [ ! -f "$MAIN_SCRIPT" ]; then
            echo "❌ 错误：指定的主文件不存在: $MAIN_SCRIPT"
            exit 1
          fi
          
          echo "main_script=$MAIN_SCRIPT" >> "$GITHUB_OUTPUT"

      - name: Determine version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          else
            SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
            echo "version=dev-$SHORT_SHA" >> "$GITHUB_OUTPUT"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Python matrix
        id: matrix
        shell: bash
        run: |
          if [ -n "${{ vars.PYTHON_VERSIONS }}" ]; then
            echo "python_versions=${{ vars.PYTHON_VERSIONS }}" >> "$GITHUB_OUTPUT"
          else
            echo "python_versions=${{ env.DEFAULT_PYTHON_VERSIONS }}" >> "$GITHUB_OUTPUT"
          fi

      # =========================================================================
      # 平台配置中心 - 所有平台定义集中在此处
      # 通过环境变量读取 vars 上下文，避免在表达式中使用动态变量名
      # =========================================================================
      - name: Generate build matrix configuration
        id: build_config
        shell: bash
        env:
          # 将 vars 上下文映射到环境变量，避免动态变量名问题
          VAR_ENABLE_WIN64: ${{ vars.ENABLE_WIN64 }}
          VAR_ENABLE_WIN32: ${{ vars.ENABLE_WIN32 }}
          VAR_ENABLE_LINUX: ${{ vars.ENABLE_LINUX }}
          VAR_ENABLE_LINUX_OLD: ${{ vars.ENABLE_LINUX_OLD }}
          VAR_ENABLE_MACOS: ${{ vars.ENABLE_MACOS }}
        run: |
          # 读取各平台开关（优先使用仓库变量，否则使用默认值）
          # 使用 ${VAR_NAME:-default} 语法：如果未设置或为空，使用默认值
          ENABLE_WIN64="${VAR_ENABLE_WIN64:-true}"
          ENABLE_WIN32="${VAR_ENABLE_WIN32:-false}"
          ENABLE_LINUX="${VAR_ENABLE_LINUX:-true}"
          ENABLE_LINUX_OLD="${VAR_ENABLE_LINUX_OLD:-false}"
          ENABLE_MACOS="${VAR_ENABLE_MACOS:-false}"

          echo "=== 平台开关状态 ==="
          echo "WIN64: $ENABLE_WIN64"
          echo "WIN32: $ENABLE_WIN32"
          echo "LINUX: $ENABLE_LINUX"
          echo "LINUX_OLD: $ENABLE_LINUX_OLD"
          echo "MACOS: $ENABLE_MACOS"

          # 构建平台配置数组
          # 每个对象定义一个构建任务的所有参数
          MATRIX_JSON='{"include":['
          
          add_build() {
            local id=$1
            local name=$2
            local os=$3
            local arch=$4
            local shell=$5
            local ext=$6
            local nuitka_flags=$7
            local cache_path=$8
            local system_deps=$9
            
            if [ "${MATRIX_JSON}" != '{"include":[' ]; then
              MATRIX_JSON="${MATRIX_JSON},"
            fi
            
            # 转义 nuitka_flags 中的引号
            local escaped_flags=$(echo "$nuitka_flags" | sed 's/"/\\"/g')
            
            MATRIX_JSON="${MATRIX_JSON}{\"id\":\"$id\",\"name\":\"$name\",\"os\":\"$os\",\"arch\":\"$arch\",\"shell\":\"$shell\",\"ext\":\"$ext\",\"nuitka_flags\":\"$escaped_flags\",\"cache_path\":\"$cache_path\",\"system_deps\":\"$system_deps\"}"
          }

          # Windows 64位配置
          if [ "$ENABLE_WIN64" == "true" ]; then
            add_build \
              "win64" \
              "Windows 64-bit" \
              "windows-2019" \
              "x64" \
              "pwsh" \
              ".exe" \
              "--windows-disable-console --windows-icon-from-ico=file.ico" \
              "~\\AppData\\Local\\pip\\Cache" \
              ""
          fi

          # Windows 32位配置
          if [ "$ENABLE_WIN32" == "true" ]; then
            add_build \
              "win32" \
              "Windows 32-bit" \
              "windows-2019" \
              "x86" \
              "pwsh" \
              ".exe" \
              "--windows-disable-console --windows-icon-from-ico=file.ico" \
              "~\\AppData\\Local\\pip\\Cache" \
              ""
          fi

          # Linux 配置
          if [ "$ENABLE_LINUX" == "true" ]; then
            add_build \
              "linux" \
              "Linux x86_64" \
              "ubuntu-20.04" \
              "x64" \
              "bash" \
              ".bin" \
              "" \
              "~/.cache/pip" \
              "python3-tk patchelf"
          fi

          # Linux 旧版配置
          if [ "$ENABLE_LINUX_OLD" == "true" ]; then
            add_build \
              "linux-old" \
              "Linux x86_64 (Old)" \
              "ubuntu-18.04" \
              "x64" \
              "bash" \
              ".bin" \
              "" \
              "~/.cache/pip" \
              "python3-tk patchelf"
          fi

          # macOS 配置
          if [ "$ENABLE_MACOS" == "true" ]; then
            add_build \
              "macos" \
              "macOS" \
              "macos-latest" \
              "x64" \
              "bash" \
              "" \
              "--macos-disable-console" \
              "~/Library/Caches/pip" \
              ""
          fi

          MATRIX_JSON="${MATRIX_JSON}]}"

          # 根据 workflow_dispatch 输入过滤矩阵
          PLATFORM_FILTER="${{ github.event.inputs.platform }}"
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ "$PLATFORM_FILTER" != "all" ]; then
            echo "🎯 手动触发，过滤平台: $PLATFORM_FILTER"
            # 使用 jq 过滤矩阵（如果已安装），否则输出全部
            if command -v jq &> /dev/null; then
              case $PLATFORM_FILTER in
                windows)
                  MATRIX_JSON=$(echo "$MATRIX_JSON" | jq '{"include":[.include[] | select(.id | startswith("win"))]}')
                  ;;
                linux)
                  MATRIX_JSON=$(echo "$MATRIX_JSON" | jq '{"include":[.include[] | select(.id | startswith("linux") and .id != "linux-old")]}')
                  ;;
                linux-old)
                  MATRIX_JSON=$(echo "$MATRIX_JSON" | jq '{"include":[.include[] | select(.id == "linux-old")]}')
                  ;;
                macos)
                  MATRIX_JSON=$(echo "$MATRIX_JSON" | jq '{"include":[.include[] | select(.id == "macos")]}')
                  ;;
                *)
                  MATRIX_JSON=$(echo "$MATRIX_JSON" | jq "{\"include\":[.include[] | select(.id == \"$PLATFORM_FILTER\")]}")
                  ;;
              esac
            fi
          fi

          # 验证矩阵非空
          BUILD_COUNT=$(echo "$MATRIX_JSON" | grep -o '"id"' | wc -l)
          if [ "$BUILD_COUNT" -eq 0 ]; then
            echo "⚠️ 警告：没有启用的构建平台"
            echo "matrix={\"include\":[]}" >> "$GITHUB_OUTPUT"
          else
            echo "matrix=$MATRIX_JSON" >> "$GITHUB_OUTPUT"
          fi

          # 生成配置摘要
          echo "summary<<EOF" >> "$GITHUB_OUTPUT"
          echo "主脚本: ${{ steps.detect.outputs.main_script }}" >> "$GITHUB_OUTPUT"
          echo "Python版本: ${{ steps.matrix.outputs.python_versions }}" >> "$GITHUB_OUTPUT"
          echo "版本号: ${{ steps.version.outputs.version }}" >> "$GITHUB_OUTPUT"
          echo "构建平台数: $BUILD_COUNT" >> "$GITHUB_OUTPUT"
          echo "平台详情: $MATRIX_JSON" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "=== 生成的构建矩阵 ==="
          echo "$MATRIX_JSON" | jq . || echo "$MATRIX_JSON"

  # =========================================================================
  # 统一构建阶段 - 通过 Matrix 动态执行所有平台
  # 无需为每个平台复制代码，所有差异通过 matrix 变量处理
  # =========================================================================
  build:
    needs: prepare
    # 只有当矩阵非空时才执行
    if: ${{ fromJSON(needs.prepare.outputs.build_matrix).include[0] != null }}
    runs-on: ${{ matrix.build.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: 
        # 动态注入矩阵配置
        build: ${{ fromJSON(needs.prepare.outputs.build_matrix).include }}
        python-version: ${{ fromJSON(needs.prepare.outputs.python_matrix) }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: ${{ matrix.build.arch }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ${{ matrix.build.cache_path }}
          key: ${{ matrix.build.id }}-py${{ matrix.python-version }}-${{ hashFiles('**/requirements.txt') }}
          restore-keys: ${{ matrix.build.id }}-py${{ matrix.python-version }}-

      - name: Install system dependencies (Linux only)
        if: ${{ startsWith(matrix.build.id, 'linux') }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y ${{ matrix.build.system_deps }}

      - name: Install Python dependencies (Unix)
        if: ${{ matrix.build.shell == 'bash' }}
        shell: bash
        run: |
          pip install --upgrade pip
          pip install nuitka zstandard
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Install Python dependencies (Windows)
        if: ${{ matrix.build.shell == 'pwsh' }}
        shell: pwsh
        run: |
          pip install --upgrade pip
          pip install nuitka zstandard
          if (Test-Path requirements.txt) { pip install -r requirements.txt }

      - name: Check for icon file (Windows only)
        if: ${{ startsWith(matrix.build.id, 'win') }}
        id: check_icon
        shell: pwsh
        run: |
          if (Test-Path file.ico) {
            "HAS_ICON=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            "HAS_ICON=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          }

      - name: Build with Nuitka (Unix)
        if: ${{ matrix.build.shell == 'bash' }}
        shell: bash
        run: |
          DATA_FILES=""
          if [ -f white_files.json ]; then
            DATA_FILES="$DATA_FILES --include-data-file=white_files.json=white_files.json"
          fi
          if [ -f config.json ]; then
            DATA_FILES="$DATA_FILES --include-data-file=config.json=config.json"
          fi
          
          OUTPUT_NAME="${{ github.event.repository.name }}-${{ matrix.build.id }}-py${{ matrix.python-version }}"
          
          nuitka --standalone --onefile \
            --assume-yes-for-downloads \
            --enable-plugin=tk-inter \
            --output-dir=dist \
            --output-filename="$OUTPUT_NAME${{ matrix.build.ext }}" \
            ${{ matrix.build.nuitka_flags }} \
            $DATA_FILES \
            ${{ needs.prepare.outputs.main_script }}

      - name: Build with Nuitka (Windows)
        if: ${{ matrix.build.shell == 'pwsh' }}
        shell: pwsh
        run: |
          $iconParam = if ("${{ steps.check_icon.outputs.HAS_ICON }}" -eq "true" -and "${{ matrix.build.nuitka_flags }}" -match "icon-from-ico") { 
            "--windows-icon-from-ico=file.ico" 
          } else { "" }
          
          $dataFiles = @()
          if (Test-Path white_files.json) { 
            $dataFiles += "--include-data-file=white_files.json=white_files.json" 
          }
          if (Test-Path config.json) { 
            $dataFiles += "--include-data-file=config.json=config.json" 
          }
          
          $baseFlags = "${{ matrix.build.nuitka_flags }}" -replace "--windows-icon-from-ico=file.ico", ""
          
          $outputName = "${{ github.event.repository.name }}-${{ matrix.build.id }}-py${{ matrix.python-version }}"
          
          nuitka --standalone --onefile `
            --assume-yes-for-downloads `
            --enable-plugin=tk-inter `
            --output-dir=dist `
            --output-filename=$outputName${{ matrix.build.ext }} `
            $baseFlags `
            $iconParam `
            $dataFiles `
            ${{ needs.prepare.outputs.main_script }}

      - name: Collect build artifacts (Unix)
        if: ${{ matrix.build.shell == 'bash' }}
        shell: bash
        run: |
          mkdir -p release-artifacts
          cp dist/*${{ matrix.build.ext }} release-artifacts/ 2>/dev/null || true
          
          DIST_DIR="dist/${{ github.event.repository.name }}-${{ matrix.build.id }}-py${{ matrix.python-version }}.dist"
          if [ -d "$DIST_DIR" ]; then
            if [ "${{ matrix.build.id }}" == "macos" ]; then
              # macOS 可能是 .app 目录
              tar -czf "release-artifacts/${{ github.event.repository.name }}-${{ matrix.build.id }}-py${{ matrix.python-version }}-full.tar.gz" -C "$DIST_DIR" .
            else
              tar -czf "release-artifacts/${{ github.event.repository.name }}-${{ matrix.build.id }}-py${{ matrix.python-version }}-full.tar.gz" -C "$DIST_DIR" .
            fi
          fi
          
          # macOS 特殊处理 .app  bundle
          APP_DIR="dist/${{ github.event.repository.name }}-${{ matrix.build.id }}-py${{ matrix.python-version }}.app"
          if [ -d "$APP_DIR" ]; then
            tar -czf "release-artifacts/${{ github.event.repository.name }}-${{ matrix.build.id }}-py${{ matrix.python-version }}-app.tar.gz" -C "$APP_DIR" .
          fi

      - name: Collect build artifacts (Windows)
        if: ${{ matrix.build.shell == 'pwsh' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "release-artifacts"
          Copy-Item "dist\*${{ matrix.build.ext }}" "release-artifacts\" -ErrorAction SilentlyContinue
          
          $distDir = "dist\${{ github.event.repository.name }}-${{ matrix.build.id }}-py${{ matrix.python-version }}.dist"
          if (Test-Path $distDir) {
            $zipPath = "release-artifacts\${{ github.event.repository.name }}-${{ matrix.build.id }}-py${{ matrix.python-version }}-full.zip"
            Compress-Archive -Path "$distDir\*" -DestinationPath $zipPath -Force
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.build.id }}-py${{ matrix.python-version }}
          path: release-artifacts/*
          if-no-files-found: error

  # =========================================================================
  # Release发布阶段
  # =========================================================================
  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # 只有当需要发布且构建成功时才执行
    if: |
      always() && 
      needs.prepare.result == 'success' && 
      needs.prepare.outputs.should_release == 'true' &&
      needs.build.result == 'success'
    
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: '*-py*'
          merge-multiple: false

      - name: Verify downloaded artifacts
        shell: bash
        run: |
          echo "=== 构建产物结构 ==="
          find all-artifacts -type f | head -30
          
          echo ""
          echo "=== 各平台产物统计 ==="
          for dir in all-artifacts/*/; do
            if [ -d "$dir" ]; then
              platform=$(basename "$dir")
              size=$(du -sh "$dir" | cut -f1)
              file_count=$(find "$dir" -type f | wc -l)
              echo "  $platform: $size ($file_count 个文件)"
            fi
          done

      - name: Organize release assets
        shell: bash
        run: |
          mkdir -p release-assets
          
          for artifact_dir in all-artifacts/*/; do
            if [ -d "$artifact_dir" ]; then
              platform=$(basename "$artifact_dir")
              echo "处理平台: $platform"
              
              for file in "$artifact_dir"/*; do
                if [ -f "$file" ]; then
                  filename=$(basename "$file")
                  # 保持文件名简洁，去掉重复的平台标识
                  cp "$file" "release-assets/${filename}"
                  echo "  -> ${filename}"
                fi
              done
            fi
          done
          
          echo ""
          echo "=== 最终发布文件 ==="
          ls -lh release-assets/

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: Release ${{ needs.prepare.outputs.version }}
          body: |
            ## 构建配置
            ${{ needs.prepare.outputs.build_summary }}
            
            ## 文件说明
            - `*-win64-pyX.Y.exe`: Windows 64位单文件版本
            - `*-win32-pyX.Y.exe`: Windows 32位单文件版本  
            - `*-linux-pyX.Y.bin`: Linux x86_64单文件版本
            - `*-linux-old-pyX.Y.bin`: Linux 旧版兼容单文件版本
            - `*-macos-pyX.Y`: macOS单文件版本
            - `*-full.zip`: Windows完整多文件版本
            - `*-full.tar.gz`: Linux/macOS完整多文件版本
            
            ## 使用说明
            - **单文件版本**: 直接运行上述文件
            - **完整版本**: 解压 `-full` 压缩包后运行
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release Summary
        if: success()
        shell: bash
        run: |
          echo "✅ Release ${{ needs.prepare.outputs.version }} 创建成功"
          echo "📦 上传文件数: $(ls release-assets/ | wc -l)"
