name: Build and Release with Nuitka

# 触发条件：
# - 推送代码到 main/master 分支（日常测试）
# - 创建针对 main/master 的 PR（测试）
# - 推送以 v 开头的标签（例如 v1.0.0）时，自动构建并发布 Release
on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    # 必须的权限：允许上传 Artifact，后续 release 任务也需要写入 Release
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 缓存 pip 依赖（加速构建，但无 requirements.txt 时不影响）
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # 安装 Nuitka 和 zstandard（支持 onefile 压缩）
      # 如果有 requirements.txt，也一并安装
      - name: Install Nuitka and dependencies
        run: |
          pip install --upgrade pip
          pip install nuitka zstandard
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
        shell: bash

      # Linux 需要系统 Tkinter 库
      - name: Install Tkinter (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y python3-tk
        shell: bash

      # Windows 构建：使用 PowerShell，每行末尾反引号后不能有任何内容
      - name: Build with Nuitka (Windows)
        if: runner.os == 'Windows'
        run: |
          nuitka --standalone --onefile `
                 --assume-yes-for-downloads `
                 --enable-plugin=tk-inter `
                 --output-dir=dist `
                 --windows-icon-from-ico=file.ico `
                 --include-data-file=white_files.json=white_files.json `
                 main.py
        shell: pwsh

      # Linux 构建：使用 Bash，每行末尾反斜杠后不能有任何内容
      - name: Build with Nuitka (Linux)
        if: runner.os == 'Linux'
        run: |
          nuitka --standalone --onefile \
                 --enable-plugin=tk-inter \
                 --output-dir=dist \
                 --include-data-file=white_files.json=white_files.json \
                 main.py
        shell: bash

      # 调试：列出 dist 目录内容，确认生成的文件名
      - name: List dist directory
        if: always()
        run: |
          echo "=== Dist directory contents ==="
          ls -la dist/ || echo "dist/ not found"
        shell: bash

      # 上传构建产物到 Actions Artifacts（临时存储，供 release 任务使用）
      - name: Upload artifacts to Actions
        uses: actions/upload-artifact@v4
        with:
          name: PythonSizeCruncher-${{ runner.os }}
          path: |
            dist/main*
            dist/*.exe
          if-no-files-found: error

  # 发布 Release 的任务：仅在推送标签时执行
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      # 下载所有平台的 Artifacts 到当前工作目录下的 artifacts 文件夹
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      # 调试：列出下载的文件，确认文件名
      - name: Verify downloaded files
        run: ls -la artifacts/

      # 创建 Release 并上传文件
      # 使用 YAML 列表形式指定文件，每行末尾可加注释（YAML 语法允许）
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files:
            - artifacts/main.exe  # Windows 可执行文件
            - artifacts/main.bin  # Linux 可执行文件
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}