name: Build PythonSizeCruncher with Nuitka

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  release:
    types: [published]          # 新增：发布 Release 时触发

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write            # 必须：允许向 Release 写入文件

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Nuitka and dependencies
        run: |
          pip install --upgrade pip
          pip install nuitka zstandard
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
        shell: bash

      - name: Install Tkinter (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y python3-tk
        shell: bash

      - name: Build with Nuitka (Windows)
        if: runner.os == 'Windows'
        run: |
          nuitka --standalone --onefile `
                 --assume-yes-for-downloads `
                 --enable-plugin=tk-inter `
                 --output-dir=dist `
                 --windows-icon-from-ico=file.ico `
                 --include-data-file=white_files.json=white_files.json `
                 main.py
        shell: pwsh

      - name: Build with Nuitka (Linux)
        if: runner.os == 'Linux'
        run: |
          nuitka --standalone --onefile \
                 --enable-plugin=tk-inter \
                 --output-dir=dist \
                 --include-data-file=white_files.json=white_files.json \
                 main.py
        shell: bash

      - name: List dist directory
        if: always()
        run: |
          echo "=== Dist directory contents ==="
          ls -la dist/ || echo "dist/ not found"
        shell: bash

      # 上传到 Actions Artifacts（保留）
      - name: Upload artifacts to Actions
        uses: actions/upload-artifact@v4
        with:
          name: PythonSizeCruncher-${{ runner.os }}
          path: |
            dist/main*
            dist/*.exe
          if-no-files-found: error

      # 调试 Release 事件信息
      - name: Debug Release Event
        if: github.event_name == 'release'
        run: |
          echo "Release event detected!"
          echo "Release ID: ${{ github.event.release.id }}"
          echo "Release tag: ${{ github.event.release.tag_name }}"
          echo "Upload URL: ${{ github.event.release.upload_url }}"
        shell: bash

      # 上传到 Release（关键步骤）
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/main*
            dist/*.exe
          fail_on_unmatched_files: true   # 如果文件没找到，让步骤失败
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
