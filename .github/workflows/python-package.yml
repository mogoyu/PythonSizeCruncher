name: Build PythonSizeCruncher with Nuitka

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 缓存 pip 依赖（可选，若希望缓存，建议使用 setup-python 内置缓存，无需单独 actions/cache）
      # 注：下方使用 actions/cache 需要处理不同系统的路径，简单起见可直接移除本步骤。
      # 若保留，请确保路径正确，或改用 setup-python 的 cache: 'pip'（需要 requirements.txt 存在）。
      - name: Cache pip dependencies
        uses: actions/cache@v3
        id: cache-pip
        with:
          path: |
            ~/.cache/pip
            ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Nuitka and dependencies
        run: |
          pip install --upgrade pip
          pip install nuitka
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
        shell: bash

      - name: Install Tkinter (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y python3-tk
        shell: bash

      - name: Build with Nuitka (Windows)
        if: runner.os == 'Windows'
        run: |
          nuitka --standalone --onefile `
                 --output-dir=dist `
                 --windows-icon-from-ico=file.ico `
                 --include-data-file=white_files.json=white_files.json `
                 main.py
        shell: pwsh

      - name: Build with Nuitka (Linux)
        if: runner.os == 'Linux'
        run: |
          nuitka --standalone --onefile \
                 --output-dir=dist \
                 --include-data-file=white_files.json=white_files.json \
                 main.py
        shell: bash

      # 可选：添加调试步骤，查看生成的文件
      - name: List dist directory
        if: always()
        run: |
          echo "=== Dist directory contents ==="
          ls -la dist/ || echo "dist/ not found"
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PythonSizeCruncher-${{ runner.os }}
          path: |
            dist/main*
            dist/*.exe
          # 注意：此处不能有注释，注释已移至上方
          if-no-files-found: error
