name: Build PythonSizeCruncher with Nuitka

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 缓存 pip 依赖（可选，若无需缓存可删除此步骤）
      - name: Cache pip dependencies
        uses: actions/cache@v3
        id: cache-pip
        with:
          path: |
            ~/.cache/pip
            ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Nuitka and dependencies
        run: |
          pip install --upgrade pip
          pip install nuitka zstandard  # 安装 zstandard 以支持 onefile 压缩
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
        shell: bash

      - name: Install Tkinter (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y python3-tk
        shell: bash

      - name: Build with Nuitka (Windows)
        if: runner.os == 'Windows'
        run: |
          nuitka --standalone --onefile `
                 --assume-yes-for-downloads `           # 允许自动下载 Dependency Walker
                 --enable-plugin=tk-inter `             # 启用 Tkinter 插件，包含 TCL 支持
                 --output-dir=dist `
                 --windows-icon-from-ico=file.ico `     # 若 file.ico 不存在，请删除此行
                 --include-data-file=white_files.json=white_files.json `
                 main.py
        shell: pwsh

      - name: Build with Nuitka (Linux)
        if: runner.os == 'Linux'
        run: |
          nuitka --standalone --onefile \
                 --enable-plugin=tk-inter \
                 --output-dir=dist \
                 --include-data-file=white_files.json=white_files.json \
                 main.py
        shell: bash

      # 调试：列出 dist 目录内容
      - name: List dist directory
        if: always()
        run: |
          echo "=== Dist directory contents ==="
          ls -la dist/ || echo "dist/ not found"
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PythonSizeCruncher-${{ runner.os }}
          path: |
            dist/main*
            dist/*.exe
          if-no-files-found: error
