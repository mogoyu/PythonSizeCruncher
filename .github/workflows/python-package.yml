name: Build and Release with Nuitka

# 触发条件：
# - 推送代码到 main/master 分支时（用于日常测试）
# - 创建针对 main/master 的 PR 时（用于测试）
# - 推送以 v 开头的标签时（用于发布 Release）
on:
  push:
    branches: [ "main", "master" ]
    tags:
      - "v*"                # 重要：推送 v1.0.0、v2.1 这样的标签时会触发
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    permissions:
      contents: write        # 允许上传文件到 Release

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cache/pip
            ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Nuitka and dependencies
        run: |
          pip install --upgrade pip
          pip install nuitka zstandard
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi
        shell: bash

      - name: Install Tkinter (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y python3-tk
        shell: bash

      - name: Build with Nuitka (Windows)
        if: runner.os == 'Windows'
        run: |
          nuitka --standalone --onefile `
                 --assume-yes-for-downloads `
                 --enable-plugin=tk-inter `
                 --output-dir=dist `
                 --windows-icon-from-ico=file.ico `
                 --include-data-file=white_files.json=white_files.json `
                 main.py
        shell: pwsh

      - name: Build with Nuitka (Linux)
        if: runner.os == 'Linux'
        run: |
          nuitka --standalone --onefile \
                 --enable-plugin=tk-inter \
                 --output-dir=dist \
                 --include-data-file=white_files.json=white_files.json \
                 main.py
        shell: bash

      - name: List dist directory
        if: always()
        run: |
          echo "=== Dist directory contents ==="
          ls -la dist/ || echo "dist/ not found"
        shell: bash

      # 将生成的文件上传到 Actions 的 Artifacts（临时存储）
      - name: Upload artifacts to Actions
        uses: actions/upload-artifact@v4
        with:
          name: PythonSizeCruncher-${{ runner.os }}
          path: |
            dist/main*
            dist/*.exe
          if-no-files-found: error

  # 新增：发布 Release 的任务
  release:
    needs: build            # 等待所有构建任务完成
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # 仅在推送标签时执行这个任务
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true   # 将所有平台的产物合并到一个目录

      - name: Verify downloaded files
        run: ls -la artifacts/    # 调试：列出下载的文件

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/main.exe     # Windows 可执行文件
            artifacts/main.bin     # Linux 可执行文件
          tag_name: ${{ github.ref_name }}   # 自动使用推送的标签名
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}